<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Justin T. Faust</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Georgia', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      text-align: center;
    }

    .name {
      font-size: 3.5rem;
      font-weight: normal;
      letter-spacing: 0.05em;
      color: #f0f0f0;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: #c9a84c;
      margin: 1.5rem auto;
    }

    .amount {
      font-size: 2rem;
      color: #c9a84c;
      letter-spacing: 0.1em;
    }

    .label {
      font-size: 0.85rem;
      color: #666;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="name">Justin T. Faust</h1>
    <div class="divider"></div>
    <div class="amount">$250,000</div>
    <div class="label">per year</div>
  </div>
</body>
</html>
