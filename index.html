<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Justin T. Faust</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(160deg, #05050f 0%, #130508 100%);
      background-attachment: fixed;
      color: #fff;
      font-family: 'Georgia', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      text-align: center;
    }

    .name {
      font-size: 3.5rem;
      font-weight: normal;
      letter-spacing: 0.05em;
      color: #f0f0f0;
    }

    .divider {
      height: 2px;
      background: #c9a84c;
      margin: 1.5rem auto;
    }

    .amount {
      font-size: 2rem;
      color: #c9a84c;
      letter-spacing: 0.1em;
      transition: text-shadow 0.1s ease;
    }

    .amount.glow {
      text-shadow: 0 0 20px rgba(201, 168, 76, 0.6);
    }

    .label {
      font-size: 0.85rem;
      color: #666;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    .slider-container {
      margin-top: 2.5rem;
    }

    .slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 2px;
      border-radius: 1px;
      background: linear-gradient(
        to right,
        #c9a84c var(--fill, 0%),
        #2a2a2a var(--fill, 0%)
      );
      outline: none;
      cursor: pointer;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #c9a84c;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .slider::-webkit-slider-thumb:hover {
      transform: scale(1.25);
      box-shadow: 0 0 12px rgba(201, 168, 76, 0.5);
    }

    .slider::-webkit-slider-thumb:active {
      transform: scale(1.1);
      box-shadow: 0 0 18px rgba(201, 168, 76, 0.7);
    }

    .slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #c9a84c;
      cursor: pointer;
      border: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .slider::-moz-range-thumb:hover {
      transform: scale(1.25);
      box-shadow: 0 0 12px rgba(201, 168, 76, 0.5);
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 0.75rem;
      font-size: 0.7rem;
      color: #3a3a3a;
      letter-spacing: 0.15em;
      font-family: 'Georgia', serif;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="name">Justin T. Faust</h1>
    <div class="divider"></div>
    <div id="amount" class="amount">$250,000</div>
    <div class="label">per year</div>
    <div class="slider-container">
      <input
        type="range"
        id="salary-slider"
        class="slider"
        min="250000"
        max="500000"
        value="250000"
        step="1000"
      />
      <div class="slider-labels">
        <span>$250K</span>
        <span>$500K</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
